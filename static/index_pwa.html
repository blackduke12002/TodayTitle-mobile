<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>今日爆款内容生成器</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0e1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0e1117 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
        }
        .splash-title {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .splash-subtitle {
            color: #9ca3af;
            font-size: 14px;
        }
        .spinner {
            margin-top: 32px;
            width: 40px;
            height: 40px;
            border: 3px solid #374151;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="splash">
        <svg class="splash-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 20H5C4.46957 20 4 19.5304 4 19V5C4 4.46957 4.46957 4 5 4H19C19.5304 4 20 4.46957 20 5V19C20 19.5304 19.5304 20 19 20Z" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 7H16M8 12H16M8 17H12" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="splash-title">今日爆款</div>
        <div class="splash-subtitle">AI 内容生成助手</div>
        <div class="spinner"></div>
    </div>
    <iframe id="app-frame" src="/"></iframe>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }

        // Hide splash screen when iframe loads
        const iframe = document.getElementById('app-frame');
        const splash = document.getElementById('splash');
        
        iframe.onload = () => {
            setTimeout(() => {
                splash.classList.add('hidden');
            }, 500);
        };

        // Fallback in case iframe takes too long
        setTimeout(() => {
            splash.classList.add('hidden');
        }, 5000);
    </script>
</body>
</html>
